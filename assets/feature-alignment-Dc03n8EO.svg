<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <rect width="600" height="350" fill="#f8f9fa" rx="8"/>

  <defs>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">特征点对齐 (Feature Alignment)</text>
  <text x="300" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">基于特征匹配的图像配准</text>

  <!-- Frame 1: Reference -->
  <g transform="translate(25, 60)">
    <rect x="0" y="0" width="220" height="200" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>
    <text x="110" y="-5" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#555">参考帧 (Reference)</text>

    <!-- Scene content -->
    <!-- House shape -->
    <polygon points="110,50 70,90 150,90" fill="#3a3a5e" stroke="#555" stroke-width="1"/>
    <rect x="85" y="90" width="50" height="40" fill="#3a3a5e" stroke="#555" stroke-width="1"/>
    <rect x="95" y="100" width="12" height="15" fill="#555"/>

    <!-- Ground -->
    <line x1="40" y1="130" x2="190" y2="130" stroke="#555" stroke-width="0.8"/>

    <!-- Feature points in reference -->
    <circle cx="70" cy="80" r="3.5" fill="#4a90d9" stroke="#fff" stroke-width="1.2"/>
    <circle cx="150" cy="80" r="3.5" fill="#4a90d9" stroke="#fff" stroke-width="1.2"/>
    <circle cx="110" cy="50" r="3.5" fill="#2ecc71" stroke="#fff" stroke-width="1.2"/>
    <circle cx="85" cy="100" r="3.5" fill="#e5a000" stroke="#fff" stroke-width="1.2"/>
    <circle cx="135" cy="100" r="3.5" fill="#e5a000" stroke="#fff" stroke-width="1.2"/>
    <circle cx="50" cy="115" r="3.5" fill="#9c27b0" stroke="#fff" stroke-width="1.2"/>
    <circle cx="175" cy="110" r="3.5" fill="#9c27b0" stroke="#fff" stroke-width="1.2"/>
    <circle cx="110" cy="90" r="3.5" fill="#e53" stroke="#fff" stroke-width="1.2"/>

    <!-- Labels for points -->
    <text x="70" y="73" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4a90d9">P1</text>
    <text x="150" y="73" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4a90d9">P2</text>
    <text x="110" y="43" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2ecc71">P3</text>
    <text x="85" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e5a000">P4</text>
    <text x="135" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e5a000">P5</text>
    <text x="50" y="122" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9c27b0">P6</text>
    <text x="175" y="117" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9c27b0">P7</text>
    <text x="110" y="97" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e53">P8</text>
  </g>

  <!-- Arrow between frames -->
  <line x1="250" y1="160" x2="275" y2="160" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- Frame 2: Current (with offset) -->
  <g transform="translate(285, 60)">
    <rect x="0" y="0" width="220" height="200" rx="6" fill="#2d2d44" stroke="#555" stroke-width="1.5"/>
    <text x="110" y="-5" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#555">当前帧 (Current)</text>

    <!-- Scene content slightly shifted -->
    <polygon points="115,52 75,92 155,92" fill="#3a3a5e" stroke="#555" stroke-width="1"/>
    <rect x="90" y="92" width="50" height="40" fill="#3a3a5e" stroke="#555" stroke-width="1"/>
    <rect x="100" y="102" width="12" height="15" fill="#555"/>

    <line x1="45" y1="132" x2="195" y2="132" stroke="#555" stroke-width="0.8"/>

    <!-- Matched feature points (shifted) -->
    <circle cx="75" cy="82" r="3.5" fill="#4a90d9" stroke="#fff" stroke-width="1.2"/>
    <circle cx="155" cy="82" r="3.5" fill="#4a90d9" stroke="#fff" stroke-width="1.2"/>
    <circle cx="115" cy="52" r="3.5" fill="#2ecc71" stroke="#fff" stroke-width="1.2"/>
    <circle cx="90" cy="102" r="3.5" fill="#e5a000" stroke="#fff" stroke-width="1.2"/>
    <circle cx="140" cy="102" r="3.5" fill="#e5a000" stroke="#fff" stroke-width="1.2"/>
    <circle cx="55" cy="117" r="3.5" fill="#9c27b0" stroke="#fff" stroke-width="1.2"/>
    <circle cx="180" cy="112" r="3.5" fill="#9c27b0" stroke="#fff" stroke-width="1.2"/>
    <circle cx="115" cy="92" r="3.5" fill="#e53" stroke="#fff" stroke-width="1.2"/>

    <!-- Labels -->
    <text x="75" y="75" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4a90d9">P1'</text>
    <text x="155" y="75" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4a90d9">P2'</text>
    <text x="115" y="45" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2ecc71">P3'</text>
    <text x="90" y="109" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e5a000">P4'</text>
    <text x="140" y="109" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e5a000">P5'</text>
    <text x="55" y="124" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9c27b0">P6'</text>
    <text x="180" y="119" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9c27b0">P7'</text>
    <text x="115" y="99" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e53">P8'</text>
  </g>

  <!-- Matching lines overlay -->
  <g transform="translate(0, 0)">
    <!-- P1 <-> P1' -->
    <line x1="95" y1="140" x2="360" y2="142" stroke="#4a90d9" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
    <!-- P4 <-> P4' -->
    <line x1="110" y1="160" x2="375" y2="162" stroke="#e5a000" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
    <!-- P6 <-> P6' -->
    <line x1="75" y1="175" x2="340" y2="177" stroke="#9c27b0" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  </g>

  <!-- Result panel at bottom -->
  <g transform="translate(130, 285)">
    <rect x="0" y="0" width="340" height="50" rx="6" fill="#eef2f7" stroke="#4a90d9" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="170" y="18" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4a90d9">特征匹配与运动估计</text>
    <text x="170" y="34" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#666">通过描述子匹配 (SIFT/ORB/LK光流) 计算单应性矩阵</text>
    <!-- Plus icon -->
    <circle cx="15" cy="25" r="8" fill="#4a90d9" opacity="0.8"/>
    <line x1="11" y1="25" x2="19" y2="25" stroke="#fff" stroke-width="1.5"/>
    <line x1="15" y1="21" x2="15" y2="29" stroke="#fff" stroke-width="1.5"/>
  </g>
</svg>