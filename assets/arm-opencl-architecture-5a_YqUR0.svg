<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <rect width="600" height="350" fill="#f8f9fa" rx="8"/>

  <defs>
    <linearGradient id="cpuGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#357abd"/>
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <linearGradient id="npuGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e5a000"/>
      <stop offset="100%" stop-color="#c69000"/>
    </linearGradient>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9c27b0"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2ecc71"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e5a000"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">ARM + OpenCL 异构计算架构</text>
  <text x="300" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">ARM Mali / Qualcomm Adreno 上的 OpenCL 加速</text>

  <!-- Host / Application Layer -->
  <g transform="translate(130, 52)">
    <rect x="0" y="0" width="340" height="28" rx="5" fill="#eef2f7" stroke="#ccc" stroke-width="0.8"/>
    <text x="170" y="19" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#555">Host: 应用层 / Linux Kernel</text>
  </g>

  <!-- Arrow down -->
  <line x1="300" y1="80" x2="300" y2="100" stroke="#888" stroke-width="1.2" marker-end="url(#arrowDownSmall)"/>

  <!-- OpenCL Layer -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="400" height="26" rx="5" fill="#4a90d9" opacity="0.12" stroke="#4a90d9" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="200" y="18" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#4a90d9">OpenCL Runtime (Command Queue / Kernel Execution)</text>
  </g>

  <!-- Arrow down to compute units -->
  <line x1="300" y1="126" x2="300" y2="146" stroke="#888" stroke-width="1.2"/>
  <text x="290" y="140" font-family="sans-serif" font-size="8" fill="#999">▼</text>

  <!-- Three compute units: CPU, GPU, NPU -->
  <!-- CPU Block -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="160" height="95" rx="8" fill="#f0f4f8" stroke="#4a90d9" stroke-width="1.5"/>
    <rect x="0" y="0" width="160" height="28" rx="8" fill="url(#cpuGrad)"/>
    <rect x="0" y="20" width="160" height="8" fill="url(#cpuGrad)"/>
    <text x="80" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">ARM CPU</text>
    
    <!-- Cores -->
    <g transform="translate(10, 38)">
      <rect x="0" y="0" width="28" height="20" rx="3" fill="#4a90d9" opacity="0.3"/>
      <text x="14" y="14" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#4a90d9">A76</text>
      <rect x="33" y="0" width="28" height="20" rx="3" fill="#4a90d9" opacity="0.25"/>
      <text x="47" y="14" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#4a90d9">A76</text>
      <rect x="66" y="0" width="28" height="20" rx="3" fill="#4a90d9" opacity="0.2"/>
      <text x="80" y="14" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#4a90d9">A55</text>
      <rect x="99" y="0" width="28" height="20" rx="3" fill="#4a90d9" opacity="0.15"/>
      <text x="113" y="14" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#4a90d9">A55</text>
    </g>
    
    <text x="80" y="78" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">L1/L2/L3 Cache</text>
    <line x1="20" y1="85" x2="140" y2="85" stroke="#4a90d9" stroke-width="0.8" opacity="0.5"/>
    
    <!-- CL tag -->
    <rect x="100" y="40" width="50" height="16" rx="3" fill="#4a90d9" opacity="0.1"/>
    <text x="125" y="52" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#4a90d9">CL 设备 0</text>
  </g>

  <!-- GPU Block -->
  <g transform="translate(220, 150)">
    <rect x="0" y="0" width="160" height="95" rx="8" fill="#f8f0fc" stroke="#9c27b0" stroke-width="1.5"/>
    <rect x="0" y="0" width="160" height="28" rx="8" fill="url(#gpuGrad)"/>
    <rect x="0" y="20" width="160" height="8" fill="url(#gpuGrad)"/>
    <text x="80" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Mali / Adreno GPU</text>
    
    <!-- Shader cores -->
    <g transform="translate(8, 38)">
      <rect x="0" y="0" width="20" height="20" rx="2" fill="#9c27b0" opacity="0.4"/>
      <rect x="24" y="0" width="20" height="20" rx="2" fill="#9c27b0" opacity="0.35"/>
      <rect x="48" y="0" width="20" height="20" rx="2" fill="#9c27b0" opacity="0.3"/>
      <rect x="72" y="0" width="20" height="20" rx="2" fill="#9c27b0" opacity="0.25"/>
      <rect x="96" y="0" width="20" height="20" rx="2" fill="#9c27b0" opacity="0.2"/>
      <rect x="120" y="0" width="20" height="20" rx="2" fill="#9c27b0" opacity="0.15"/>
    </g>
    
    <text x="80" y="78" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">Shader Core × N</text>
    <line x1="20" y1="85" x2="140" y2="85" stroke="#9c27b0" stroke-width="0.8" opacity="0.5"/>
    
    <rect x="100" y="40" width="50" height="16" rx="3" fill="#9c27b0" opacity="0.1"/>
    <text x="125" y="52" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#9c27b0">CL 设备 1</text>
  </g>

  <!-- NPU Block -->
  <g transform="translate(410, 150)">
    <rect x="0" y="0" width="160" height="95" rx="8" fill="#f0faf0" stroke="#2ecc71" stroke-width="1.5"/>
    <rect x="0" y="0" width="160" height="28" rx="8" fill="url(#npuGrad)"/>
    <rect x="0" y="20" width="160" height="8" fill="url(#npuGrad)"/>
    <text x="80" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">NPU / DSP</text>
    
    <g transform="translate(15, 38)">
      <rect x="0" y="0" width="50" height="20" rx="3" fill="#2ecc71" opacity="0.25"/>
      <text x="25" y="14" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2ecc71">MAC阵列</text>
      <rect x="58" y="0" width="50" height="20" rx="3" fill="#2ecc71" opacity="0.2"/>
      <text x="83" y="14" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2ecc71">Buffer</text>
    </g>
    
    <text x="80" y="78" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">AI 加速引擎</text>
    <line x1="20" y1="85" x2="140" y2="85" stroke="#2ecc71" stroke-width="0.8" opacity="0.5"/>
    
    <rect x="100" y="40" width="50" height="16" rx="3" fill="#2ecc71" opacity="0.1"/>
    <text x="125" y="52" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#2ecc71">CL 设备 2</text>
  </g>

  <!-- Shared Memory -->
  <g transform="translate(130, 260)">
    <rect x="0" y="0" width="340" height="32" rx="6" fill="#fff8e0" stroke="#e5a000" stroke-width="1.5"/>
    <rect x="0" y="0" width="340" height="32" rx="6" fill="url(#memGrad)" opacity="0.1"/>
    <text x="170" y="21" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e5a000">共享内存 (Shared Memory / DMA)</text>
  </g>

  <!-- Data transfer arrows from compute to memory -->
  <line x1="110" y1="245" x2="200" y2="260" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>
  <line x1="300" y1="245" x2="300" y2="260" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowPurple)" stroke-dasharray="5,3"/>
  <line x1="490" y1="245" x2="400" y2="260" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrowGreen)" stroke-dasharray="5,3"/>

  <!-- Data transfer labels -->
  <text x="145" y="252" font-family="sans-serif" font-size="7" fill="#4a90d9">读/写</text>
  <text x="310" y="252" font-family="sans-serif" font-size="7" fill="#9c27b0">读/写</text>
  <text x="420" y="252" font-family="sans-serif" font-size="7" fill="#2ecc71">读/写</text>

  <!-- Bottom: OpenCL memory model -->
  <g transform="translate(40, 305)">
    <rect x="0" y="0" width="520" height="30" rx="5" fill="#f8f9fa" stroke="#ddd" stroke-width="0.8"/>
    <text x="15" y="19" font-family="sans-serif" font-size="9" font-weight="bold" fill="#555">OpenCL 内存模型:</text>
    
    <rect x="130" y="6" width="70" height="18" rx="3" fill="#4a90d9" opacity="0.15"/>
    <text x="165" y="18" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4a90d9">Global Mem</text>
    
    <rect x="210" y="6" width="70" height="18" rx="3" fill="#9c27b0" opacity="0.15"/>
    <text x="245" y="18" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9c27b0">Constant Mem</text>
    
    <rect x="290" y="6" width="70" height="18" rx="3" fill="#e5a000" opacity="0.15"/>
    <text x="325" y="18" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e5a000">Local Mem</text>
    
    <rect x="370" y="6" width="70" height="18" rx="3" fill="#2ecc71" opacity="0.15"/>
    <text x="405" y="18" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2ecc71">Private Mem</text>
  </g>
</svg>