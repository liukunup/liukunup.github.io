<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 320">
  <rect width="550" height="320" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="275" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">坐标系变换流程</text>

  <!-- World Coordinate System -->
  <g transform="translate(80, 120)">
    <circle cx="0" cy="0" r="5" fill="#333"/>
    <line x1="0" y1="0" x2="50" y2="15" stroke="#e53" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="-15" y2="50" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="55" y="20" font-size="11" fill="#c53">X_w</text>
    <text x="-25" y="60" font-size="11" fill="#27ae60">Y_w</text>
    <text x="5" y="-55" font-size="11" fill="#4a90d9">Z_w</text>
    <text x="0" y="75" text-anchor="middle" font-size="12" fill="#333">世界坐标系</text>
  </g>

  <!-- Transformation Arrow -->
  <g transform="translate(180, 120)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="10" y="-15" width="40" height="30" fill="#e3f2fd" stroke="#4a90d9" stroke-width="1" rx="3"/>
    <text x="30" y="5" text-anchor="middle" font-size="10" fill="#1565c0">[R|t]</text>
  </g>

  <!-- Camera Coordinate System -->
  <g transform="translate(320, 120)">
    <circle cx="0" cy="0" r="5" fill="#333"/>
    <line x1="0" y1="0" x2="50" y2="15" stroke="#e53" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="-15" y2="50" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="0" y1="0" x2="0" y2="-50" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="55" y="20" font-size="11" fill="#c53">X_c</text>
    <text x="-25" y="60" font-size="11" fill="#27ae60">Y_c</text>
    <text x="5" y="-55" font-size="11" fill="#4a90d9">Z_c</text>
    <text x="0" y="75" text-anchor="middle" font-size="12" fill="#333">相机坐标系</text>
  </g>

  <!-- Projection Arrow -->
  <g transform="translate(420, 120)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="5" y="-15" width="40" height="30" fill="#fff3e0" stroke="#ff9800" stroke-width="1" rx="3"/>
    <text x="25" y="5" text-anchor="middle" font-size="10" fill="#e65100">内参 K</text>
  </g>

  <!-- Image Plane -->
  <g transform="translate(520, 120)">
    <rect x="-40" y="-60" width="80" height="120" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
    <text x="0" y="75" text-anchor="middle" font-size="12" fill="#333">图像坐标系</text>
    <circle cx="0" cy="0" r="4" fill="#e53"/>
    <text x="0" y="-70" font-size="10" fill="#c53">(u, v)</text>
  </g>

  <!-- Formulas Box -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="450" height="70" fill="#fafafa" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="15" y="20" font-size="11" fill="#333">
      <tspan font-weight="bold">外参变换:</tspan>
      <tspan x="130" y="20"> X_c = R × X_w + t</tspan>
    </text>
    <text x="15" y="40" font-size="11" fill="#333">
      <tspan font-weight="bold">投影变换:</tspan>
      <tspan x="130" y="40"> x = K × X_c</tspan>
    </text>
    <text x="15" y="60" font-size="11" fill="#333">
      <tspan font-weight="bold">完整公式:</tspan>
      <tspan x="130" y="60"> x = K × [R|t] × X_w</tspan>
    </text>
  </g>

  <!-- Legend -->
  <g transform="translate(380, 230)">
    <circle cx="0" cy="10" r="4" fill="#e53"/>
    <text x="10" y="15" font-size="10" fill="#666">主点</text>
    <line x1="60" y1="10" x2="90" y2="10" stroke="#666" stroke-width="1"/>
    <text x="95" y="15" font-size="10" fill="#666">主轴</text>
  </g>
</svg>