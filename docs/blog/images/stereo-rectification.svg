<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <rect width="600" height="350" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">双目校正前后对比</text>

  <!-- Before Rectification -->
  <g transform="translate(50, 50)">
    <text x="100" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#666">校正前</text>

    <!-- Left Image with Tilted Epipolar Lines -->
    <rect x="0" y="20" width="80" height="100" fill="#e0e0e0" stroke="#666"/>
    <line x1="10" y1="30" x2="70" y2="110" stroke="#e53" stroke-width="1.5"/>
    <line x1="20" y1="30" x2="75" y2="108" stroke="#e53" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="78" y2="106" stroke="#e53" stroke-width="1.5"/>
    <text x="40" y="140" text-anchor="middle" font-size="10" fill="#c53">倾斜极线</text>

    <!-- Right Image with Tilted Epipolar Lines -->
    <rect x="120" y="20" width="80" height="100" fill="#e0e0e0" stroke="#666"/>
    <line x1="125" y1="30" x2="195" y2="110" stroke="#e53" stroke-width="1.5"/>
    <line x1="135" y1="28" x2="198" y2="105" stroke="#e53" stroke-width="1.5"/>
    <line x1="145" y1="26" x2="200" y2="100" stroke="#e53" stroke-width="1.5"/>
    <text x="160" y="140" text-anchor="middle" font-size="10" fill="#c53">倾斜极线</text>

    <!-- Corresponding Points -->
    <circle cx="30" cy="50" r="4" fill="#2ecc71"/>
    <circle cx="150" cy="65" r="4" fill="#2ecc71"/>
    <line x1="30" y1="50" x2="150" y2="65" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="90" y="75" text-anchor="middle" font-size="9" fill="#666">2D搜索</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(280, 100)">
    <line x1="0" y1="20" x2="40" y2="20" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="20" y="45" text-anchor="middle" font-size="10" fill="#4a90d9">校正变换</text>
  </g>

  <!-- After Rectification -->
  <g transform="translate(350, 50)">
    <text x="100" y="0" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">校正后</text>

    <!-- Left Image with Horizontal Epipolar Lines -->
    <rect x="0" y="20" width="80" height="100" fill="#e0e0e0" stroke="#666"/>
    <line x1="0" y1="40" x2="80" y2="40" stroke="#27ae60" stroke-width="1.5"/>
    <line x1="0" y1="60" x2="80" y2="60" stroke="#27ae60" stroke-width="1.5"/>
    <line x1="0" y1="80" x2="80" y2="80" stroke="#27ae60" stroke-width="1.5"/>
    <line x1="0" y1="100" x2="80" y2="100" stroke="#27ae60" stroke-width="1.5"/>
    <text x="40" y="140" text-anchor="middle" font-size="10" fill="#27ae60">水平极线</text>

    <!-- Right Image with Horizontal Epipolar Lines -->
    <rect x="120" y="20" width="80" height="100" fill="#e0e0e0" stroke="#666"/>
    <line x1="120" y1="40" x2="200" y2="40" stroke="#27ae60" stroke-width="1.5"/>
    <line x1="120" y1="60" x2="200" y2="60" stroke="#27ae60" stroke-width="1.5"/>
    <line x1="120" y1="80" x2="200" y2="80" stroke="#27ae60" stroke-width="1.5"/>
    <line x1="120" y1="100" x2="200" y2="100" stroke="#27ae60" stroke-width="1.5"/>
    <text x="160" y="140" text-anchor="middle" font-size="10" fill="#27ae60">水平极线</text>

    <!-- Corresponding Points on Same Epipolar Line -->
    <circle cx="30" cy="60" r="4" fill="#2ecc71"/>
    <circle cx="150" cy="60" r="4" fill="#2ecc71"/>
    <line x1="30" y1="60" x2="150" y2="60" stroke="#333" stroke-width="1"/>
    <text x="90" y="75" text-anchor="middle" font-size="9" fill="#666">1D搜索</text>
  </g>

  <!-- Baseline indicator -->
  <g transform="translate(50, 220)">
    <line x1="50" y1="0" x2="550" y2="0" stroke="#e53" stroke-width="2"/>
    <text x="300" y="20" text-anchor="middle" font-size="11" fill="#c53">基线 b (不变)</text>

    <!-- Left camera -->
    <rect x="50" y="-20" width="30" height="40" fill="#4a90d9" stroke="#2c5282" stroke-width="1"/>
    <circle cx="65" cy="0" r="3" fill="#333"/>

    <!-- Right camera -->
    <rect x="520" y="-20" width="30" height="40" fill="#4a90d9" stroke="#2c5282" stroke-width="1"/>
    <circle cx="535" cy="0" r="3" fill="#333"/>
  </g>

  <!-- Benefits -->
  <g transform="translate(50, 280)">
    <text x="0" y="0" font-size="11" fill="#666">✓ 极线对齐后，对应点搜索从 2D 降至 1D</text>
    <text x="0" y="18" font-size="11" fill="#666">✓ 简化立体匹配算法</text>
    <text x="250" y="0" font-size="11" fill="#666">✓ 提高匹配效率</text>
    <text x="250" y="18" font-size="11" fill="#666">✓ 减少误匹配</text>
  </g>
</svg>