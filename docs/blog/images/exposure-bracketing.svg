<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <rect width="600" height="350" fill="#f8f9fa" rx="8"/>
  
  <defs>
    <linearGradient id="underexposed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d44"/>
    </linearGradient>
    <linearGradient id="normalexp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="50%" stop-color="#777"/>
      <stop offset="100%" stop-color="#bbb"/>
    </linearGradient>
    <linearGradient id="overexposed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ccc"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#357abd"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#333">曝光包围 (Exposure Bracketing)</text>

  <!-- Three image frames -->
  <!-- Frame 1: Under-exposed -->
  <g transform="translate(40, 55)">
    <rect x="0" y="0" width="160" height="120" rx="6" fill="url(#underexposed)" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Scene elements inside -->
    <rect x="30" y="30" width="40" height="30" rx="2" fill="#3a3a5e" opacity="0.6"/>
    <circle cx="120" cy="45" r="15" fill="#3a3a5e" opacity="0.4"/>
    <rect x="20" y="80" width="120" height="25" rx="2" fill="#3a3a5e" opacity="0.5"/>
    
    <!-- Label -->
    <rect x="30" y="130" width="100" height="24" rx="4" fill="#e53" opacity="0.9"/>
    <text x="80" y="146" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold">欠曝光 (-2EV)</text>
  </g>

  <!-- Frame 2: Normal -->
  <g transform="translate(220, 55)">
    <rect x="0" y="0" width="160" height="120" rx="6" fill="url(#normalexp)" stroke="#aaa" stroke-width="1.5"/>
    <!-- Scene elements -->
    <rect x="30" y="30" width="40" height="30" rx="2" fill="#b8860b" opacity="0.6"/>
    <circle cx="120" cy="45" r="15" fill="#cd853f" opacity="0.5"/>
    <rect x="20" y="80" width="120" height="25" rx="2" fill="#8b7355" opacity="0.6"/>
    
    <rect x="30" y="130" width="100" height="24" rx="4" fill="#2ecc71" opacity="0.9"/>
    <text x="80" y="146" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold">正常曝光 (0EV)</text>
  </g>

  <!-- Frame 3: Over-exposed -->
  <g transform="translate(400, 55)">
    <rect x="0" y="0" width="160" height="120" rx="6" fill="url(#overexposed)" stroke="#ccc" stroke-width="1.5"/>
    <!-- Scene elements -->
    <rect x="30" y="30" width="40" height="30" rx="2" fill="#fff" opacity="0.6"/>
    <circle cx="120" cy="45" r="15" fill="#fff" opacity="0.5"/>
    <rect x="20" y="80" width="120" height="25" rx="2" fill="#fff" opacity="0.5"/>
    
    <rect x="30" y="130" width="100" height="24" rx="4" fill="#e5a000" opacity="0.9"/>
    <text x="80" y="146" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold">过曝光 (+2EV)</text>
  </g>

  <!-- Exposure level bars -->
  <g transform="translate(0, 210)">
    <text x="300" y="15" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#666">曝光水平对比</text>
    
    <!-- Bar scale -->
    <line x1="60" y1="40" x2="540" y2="40" stroke="#ddd" stroke-width="1"/>
    <text x="60" y="55" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">低曝光</text>
    <text x="300" y="55" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">中曝光</text>
    <text x="540" y="55" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">高曝光</text>

    <!-- Bar 1: Under -->
    <rect x="80" y="26" width="60" height="10" rx="3" fill="#e53" opacity="0.7"/>
    <text x="145" y="35" font-family="sans-serif" font-size="10" fill="#e53">欠曝区域 (阴影细节)</text>

    <!-- Bar 2: Normal -->
    <rect x="180" y="26" width="60" height="10" rx="3" fill="#2ecc71" opacity="0.7"/>
    <text x="245" y="35" font-family="sans-serif" font-size="10" fill="#2ecc71">正常区域</text>

    <!-- Bar 3: Over -->
    <rect x="340" y="26" width="60" height="10" rx="3" fill="#4a90d9" opacity="0.7"/>
    <text x="405" y="35" font-family="sans-serif" font-size="10" fill="#4a90d9">过曝区域 (高光细节)</text>
  </g>

  <!-- Histogram representations -->
  <g transform="translate(0, 270)">
    <!-- Under histogram -->
    <g transform="translate(40, 0)">
      <text x="60" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">直方图</text>
      <rect x="10" y="15" width="100" height="35" rx="3" fill="#fff" stroke="#ddd" stroke-width="0.5"/>
      <rect x="15" y="38" width="8" height="10" fill="#e53" opacity="0.5"/>
      <rect x="25" y="30" width="8" height="18" fill="#e53" opacity="0.6"/>
      <rect x="35" y="25" width="8" height="23" fill="#e53" opacity="0.5"/>
      <rect x="45" y="20" width="8" height="28" fill="#333" opacity="0.3"/>
      <rect x="55" y="22" width="8" height="26" fill="#333" opacity="0.2"/>
      <rect x="65" y="28" width="8" height="20" fill="#333" opacity="0.15"/>
      <rect x="75" y="35" width="8" height="13" fill="#333" opacity="0.1"/>
      <rect x="85" y="40" width="8" height="8" fill="#333" opacity="0.05"/>
    </g>

    <!-- Normal histogram -->
    <g transform="translate(210, 0)">
      <text x="60" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">直方图</text>
      <rect x="10" y="15" width="100" height="35" rx="3" fill="#fff" stroke="#ddd" stroke-width="0.5"/>
      <rect x="15" y="35" width="8" height="13" fill="#333" opacity="0.3"/>
      <rect x="25" y="28" width="8" height="20" fill="#333" opacity="0.5"/>
      <rect x="35" y="22" width="8" height="26" fill="#333" opacity="0.7"/>
      <rect x="45" y="18" width="8" height="30" fill="#2ecc71" opacity="0.6"/>
      <rect x="55" y="16" width="8" height="32" fill="#2ecc71" opacity="0.5"/>
      <rect x="65" y="20" width="8" height="28" fill="#333" opacity="0.5"/>
      <rect x="75" y="28" width="8" height="20" fill="#333" opacity="0.3"/>
      <rect x="85" y="38" width="8" height="10" fill="#333" opacity="0.2"/>
    </g>

    <!-- Over histogram -->
    <g transform="translate(380, 0)">
      <text x="60" y="10" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">直方图</text>
      <rect x="10" y="15" width="100" height="35" rx="3" fill="#fff" stroke="#ddd" stroke-width="0.5"/>
      <rect x="15" y="40" width="8" height="8" fill="#333" opacity="0.05"/>
      <rect x="25" y="38" width="8" height="10" fill="#333" opacity="0.1"/>
      <rect x="35" y="32" width="8" height="16" fill="#333" opacity="0.15"/>
      <rect x="45" y="25" width="8" height="23" fill="#333" opacity="0.2"/>
      <rect x="55" y="22" width="8" height="26" fill="#333" opacity="0.3"/>
      <rect x="65" y="20" width="8" height="28" fill="#4a90d9" opacity="0.5"/>
      <rect x="75" y="25" width="8" height="23" fill="#4a90d9" opacity="0.6"/>
      <rect x="85" y="30" width="8" height="18" fill="#4a90d9" opacity="0.5"/>
    </g>
  </g>
</svg>