<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <rect width="600" height="400" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="300" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">张正友标定法流程图</text>

  <!-- Step 1: Capture -->
  <g transform="translate(80, 60)">
    <rect x="-50" y="-25" width="100" height="50" fill="#e3f2fd" stroke="#4a90d9" stroke-width="2" rx="5"/>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#1565c0" dy="0.3em">1. 拍摄棋盘格</text>
    <text x="0" y="18" text-anchor="middle" font-size="9" fill="#666">n张图像</text>
  </g>

  <!-- Arrow to Step 2 -->
  <line x1="130" y1="60" x2="180" y2="60" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Detect Corners -->
  <g transform="translate(230, 60)">
    <rect x="-50" y="-25" width="100" height="50" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5"/>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#2e7d32" dy="0.3em">2. 角点检测</text>
    <text x="0" y="18" text-anchor="middle" font-size="9" fill="#666">findChessboardCorners</text>
  </g>

  <!-- Arrow to Step 3 -->
  <line x1="280" y1="60" x2="330" y2="60" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Refine -->
  <g transform="translate(380, 60)">
    <rect x="-50" y="-25" width="100" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#e65100" dy="0.3em">3. 亚像素细化</text>
    <text x="0" y="18" text-anchor="middle" font-size="9" fill="#666">cornerSubPix</text>
  </g>

  <!-- Arrow to Step 4 -->
  <line x1="430" y1="60" x2="480" y2="60" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Calibrate -->
  <g transform="translate(530, 60)">
    <rect x="-50" y="-25" width="100" height="50" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="5"/>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#c2185b" dy="0.3em">4. 标定求解</text>
    <text x="0" y="18" text-anchor="middle" font-size="9" fill="#666">calibrateCamera</text>
  </g>

  <!-- Output Box -->
  <g transform="translate(300, 140)">
    <rect x="-120" y="-30" width="240" height="60" fill="#fafafa" stroke="#9e9e9e" stroke-width="1" rx="5"/>
    <text x="0" y="-10" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">输出参数</text>
    <text x="-100" y="10" font-size="9" fill="#666">• 内参矩阵 K (fx, fy, cx, cy)</text>
    <text x="-100" y="25" font-size="9" fill="#666">• 畸变系数 (k1, k2, p1, p2, k3)</text>
    <text x="80" y="10" font-size="9" fill="#666">• 外参 [R|t]</text>
    <text x="80" y="25" font-size="9" fill="#666">• 重投影误差</text>
  </g>

  <!-- Branch for each image -->
  <g transform="translate(80, 200)">
    <rect x="-50" y="-25" width="100" height="50" fill="#e3f2fd" stroke="#4a90d9" stroke-width="1" rx="5"/>
    <text x="0" y="-5" text-anchor="middle" font-size="10" fill="#1565c0">第i张图像</text>
    <text x="0" y="10" text-anchor="middle" font-size="9" fill="#666">角点坐标 m_i</text>
    <text x="0" y="22" text-anchor="middle" font-size="9" fill="#666">三维物点 M_i</text>
  </g>

  <!-- Loop arrow back -->
  <path d="M 130,200 Q 180,120 130,60" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="170" y="140" font-size="9" fill="#9e9e9e">n张图</text>

  <!-- Horizontal line connecting steps 1-4 -->
  <line x1="80" y1="85" x2="480" y2="85" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Bottom section: Validation -->
  <g transform="translate(80, 300)">
    <rect x="-50" y="-25" width="100" height="50" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="5"/>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#c2185b" dy="0.3em">5. 验证评估</text>
    <text x="0" y="18" text-anchor="middle" font-size="9" fill="#666">computeReprojectionErrors</text>
  </g>

  <!-- Arrow -->
  <line x1="130" y1="300" x2="180" y2="300" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Success check -->
  <g transform="translate(230, 300)">
    <rect x="-50" y="-25" width="100" height="50" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5"/>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#2e7d32" dy="0.3em">误差 &lt; 0.5?</text>
  </g>

  <!-- Yes path -->
  <line x1="330" y1="300" x2="380" y2="300" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="355" y="290" font-size="9" fill="#4caf50">Yes</text>

  <!-- Output -->
  <g transform="translate(430, 300)">
    <rect x="-50" y="-25" width="100" height="50" fill="#e3f2fd" stroke="#4a90d9" stroke-width="2" rx="5"/>
    <text x="0" y="0" text-anchor="middle" font-size="11" fill="#1565c0" dy="0.3em">6. 输出参数</text>
  </g>

  <!-- No path -->
  <path d="M 280,325 Q 280,370 130,370 Q 130,310 130,300" fill="none" stroke="#e91e63" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="210" y="365" font-size="9" fill="#e91e63">No → 增加图像</text>

  <!-- Key formula -->
  <g transform="translate(480, 300)">
    <rect x="-50" y="-25" width="100" height="50" fill="#fff8e1" stroke="#ffc107" stroke-width="1" rx="5"/>
    <text x="0" y="0" text-anchor="middle" font-size="9" fill="#333">s × [u, v, 1]ᵀ</text>
    <text x="0" y="15" text-anchor="middle" font-size="9" fill="#333">= K × [R|t] × M</text>
    <text x="0" y="30" text-anchor="middle" font-size="8" fill="#666">单应性约束</text>
  </g>
</svg>