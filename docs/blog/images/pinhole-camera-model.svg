<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <rect width="500" height="350" fill="#f8f9fa"/>

  <!-- Camera Box -->
  <rect x="50" y="100" width="80" height="120" fill="#4a90d9" stroke="#2c5282" stroke-width="2" rx="3"/>
  <text x="90" y="235" text-anchor="middle" font-size="14" fill="#333">相机</text>

  <!-- Optical Center -->
  <circle cx="90" cy="160" r="5" fill="#333"/>
  <text x="90" y="180" text-anchor="middle" font-size="12" fill="#333">O</text>

  <!-- Image Plane (behind camera) -->
  <rect x="150" y="110" width="20" height="100" fill="#ddd" stroke="#666" stroke-width="1"/>
  <text x="180" y="165" text-anchor="middle" font-size="12" fill="#666">图像平面</text>

  <!-- Principal Axis -->
  <line x1="90" y1="160" x2="450" y2="160" stroke="#e53" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="150" text-anchor="middle" font-size="12" fill="#c53">主轴</text>

  <!-- 3D Point -->
  <circle cx="350" cy="80" r="8" fill="#2ecc71"/>
  <text x="350" y="70" text-anchor="middle" font-size="14" fill="#27ae60">X</text>

  <!-- Projection Lines -->
  <line x1="350" y1="80" x2="90" y2="160" stroke="#666" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="350" y1="80" x2="165" y2="130" stroke="#333" stroke-width="1"/>

  <!-- Projected Point -->
  <circle cx="165" cy="130" r="5" fill="#e53"/>
  <text x="165" y="120" text-anchor="middle" font-size="12" fill="#c53">x</text>

  <!-- Coordinate Axes -->
  <line x1="90" y1="160" x2="130" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="90" y1="160" x2="70" y2="190" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="90" y1="160" x2="90" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="135" y="185" font-size="10" fill="#333">X_c</text>
  <text x="55" y="195" font-size="10" fill="#333">Y_c</text>
  <text x="95" y="115" font-size="10" fill="#333">Z_c</text>

  <!-- Focal Length -->
  <line x1="90" y1="160" x2="165" y2="130" stroke="#4a90d9" stroke-width="1"/>
  <text x="120" y="140" text-anchor="middle" font-size="11" fill="#4a90d9">f</text>

  <!-- Dimension Labels -->
  <text x="250" y="300" text-anchor="middle" font-size="12" fill="#666">相似三角形关系: x = f × X / Z</text>
</svg>